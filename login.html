<!DOCTYPE html>

<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Casa CHMS - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#F9B233",
                        secondary: "#4CAF50",
                        "background-light": "#F8FAFC",
                        "background-dark": "#0F172A"
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem"
                    }
                }
            }
        };
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center px-4 transition-colors duration-200">
<div class="absolute top-4 right-4">
<button class="flex items-center gap-2 px-3 py-2 text-xs font-medium text-slate-500 hover:text-primary bg-white/70 dark:bg-slate-900/70 backdrop-blur rounded-full border border-slate-200/60 dark:border-slate-800/60 shadow-sm" onclick="document.documentElement.classList.toggle('dark')">
<span class="material-icons-outlined text-sm">dark_mode</span>
            Switch Theme
        </button>
</div>
<main class="w-full max-w-md">
<div class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 px-8 py-10">
<div class="flex flex-col items-center gap-3 mb-8">
<img alt="Casa Hotel Logo" class="h-16 w-16 rounded-xl object-contain h-10" src="logo.png"/>
<div class="text-center">
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">Casa Hotel</h1>
<p class="text-xs uppercase tracking-[0.2em] text-secondary font-semibold mt-1">Management System</p>
</div>
</div>
<h2 class="text-lg font-semibold text-slate-900 dark:text-slate-100 mb-2">Sign in to your account</h2>
<p class="text-xs text-slate-500 mb-6">Use your staff credentials to access the Casa Hotel management console.</p>
<form class="space-y-4">
<div>
<label class="block text-xs font-medium text-slate-600 dark:text-slate-300 mb-1" for="email">Email</label>
<input class="mt-1 block w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950 px-3 py-2 text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none" id="email" name="email" placeholder="you@example.com" type="email"/>
</div>
<div>
<div class="flex items-center justify-between mb-1">
<label class="block text-xs font-medium text-slate-600 dark:text-slate-300" for="password">Password</label>
<!-- Forgot password removed as requested -->
</div>
<input class="mt-1 block w-full rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-950 px-3 py-2 text-sm text-slate-900 dark:text-slate-100 placeholder:text-slate-400 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all focus:scale-[1.01]" id="password" name="password" placeholder="Enter your password" type="password"/>
</div>
<div class="flex items-center justify-between pt-2">
<label class="inline-flex items-center gap-2 text-xs text-slate-600 dark:text-slate-300 cursor-pointer select-none">
<input class="rounded border-slate-300 text-primary focus:ring-primary transition-colors" type="checkbox"/>
<span>Remember this device</span>
</label>
<span class="inline-flex items-center gap-1 text-[11px] text-slate-500">
<span class="w-2 h-2 rounded-full bg-green-500"></span>
<span>Secure connection</span>
</span>
</div>
<button class="w-full mt-4 inline-flex items-center justify-center gap-2 rounded-xl bg-primary text-white text-sm font-semibold py-2.5 shadow-sm hover:bg-amber-500 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-primary focus-visible:ring-offset-background-light dark:focus-visible:ring-offset-background-dark transition-colors" onclick="window.location.href='dashboard_1.html'" type="button">
<span class="material-icons-outlined text-base">login</span>
            Sign in
        </button>
</form>
<div class="mt-6 border-t border-dashed border-slate-200 dark:border-slate-800 pt-4 text-[11px] text-slate-500 flex items-center justify-between">
<span>Need help? Contact front office manager.</span>
<span class="font-mono">v1.0</span>
</div>
</div>
</main>
<script src="common.js"></script>
</body>
</html>
